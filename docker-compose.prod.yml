  #     networks:
  #       - nepse_no_topi

  redis:
    image: redis:alpine
    restart: always
    entrypoint: redis-server --appendonly yes
    # ports:
    #   - 6379:6379
    volumes:
      - ./redis_data:/data
      - ./redis/rc.local:/etc/rc.local
    networks:
      - nepse_no_topi

  worker:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    restart: always
    entrypoint: [
        "celery", "--app", "nepsenotopi", "worker",
        "--loglevel=info", "-Q", "default,realtime"
      ]
    depends_on:
      - web
      - redis
    volumes:
      - .:/code
      - ./logs/:/logs/
    env_file: ./env/.env
    networks:
      - nepse_no_topi

  beat:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    restart: always
    entrypoint: [
        "celery", "--app", "nepsenotopi", "beat",
        "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"
      ]
    depends_on:
      - web
      - redis
      - worker
    volumes:
      - .:/code
      - ./logs/:/logs/
    env_file: ./env/.env
    networks:
      - nepse_no_topi

