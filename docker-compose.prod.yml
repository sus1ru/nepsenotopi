services:
  web:
    env_file: ./env/.env
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    restart: always
    volumes:
      - .:/code
    depends_on:
      - pgdb
    ports:
      - 8020:8000
    entrypoint: sh /code/entrypoint.sh
    networks:
      - nepse_no_topi

  pgdb:
    image: postgres:16-alpine
    restart: always
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
    ports:
      - 5452:5432
    env_file: ./env/.env
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=10
        -c max_replication_slots=10
    healthcheck:
      test: [ 'CMD', 'psql', '-U', 'postgres', '-c', 'SELECT 1' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nepse_no_topi

